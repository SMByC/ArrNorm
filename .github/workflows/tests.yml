name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          channels: conda-forge,defaults
          channel-priority: strict
          activate-environment: arrnorm-test
          # Cache the resolved conda environment across identical runs.
          cache-environment: true

      - name: Install dependencies
        shell: bash -el {0}
        run: conda install -y gdal numpy scipy matplotlib

      - name: Run tests
        shell: bash -el {0}
        run: python -m pytest tests/ -v
